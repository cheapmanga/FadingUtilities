<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FadingUtilities</title>
    <link rel="icon" type="image/png" href="Images/favicon.png">
    <link rel="stylesheet" href="style.css">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <style>
        .admin-container {
            max-width: 1800px;
            margin: 120px auto 50px;
            padding: 30px;
        }
        .admin-login {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--primary-cyan);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .admin-login input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary-cyan);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 1rem;
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
        }
        .admin-panel {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--primary-cyan);
            border-radius: 20px;
            padding: 40px;
        }
        .admin-panel.active { display: block; }
        .file-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .file-btn {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        .file-btn:hover, .file-btn.active {
            background: var(--primary-cyan);
            color: var(--dark-bg);
        }
        
        /* CodeMirror Customization */
        .CodeMirror {
            height: 400px;
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .btn-commit {
            background: linear-gradient(135deg, var(--primary-yellow), var(--primary-pink));
            color: var(--dark-bg);
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn-commit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-preview {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: var(--dark-bg);
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .status-msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status-msg.success {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
            display: block;
        }
        .status-msg.error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
            display: block;
        }
        .user-info {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--primary-cyan);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary-cyan);
        }
        .logout-btn {
            margin-left: auto;
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid var(--primary-pink);
            color: var(--primary-pink);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
        }
        .editor-info {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Preview Panel */
        .preview-container {
            display: none;
            margin-top: 30px;
            border: 2px solid var(--primary-cyan);
            border-radius: 20px;
            overflow: hidden;
        }
        .preview-container.active { display: block; }
        .preview-header {
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-pink));
            color: var(--dark-bg);
            padding: 15px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-content {
            background: var(--dark-bg);
            padding: 30px;
            max-height: 800px;
            overflow-y: auto;
        }
        .preview-content h2 {
            color: var(--primary-cyan);
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-cyan);
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .preview-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
        }
        .preview-card h3 {
            color: var(--primary-yellow);
            margin-bottom: 10px;
        }
        .preview-card h4 {
            color: var(--primary-cyan);
            margin: 15px 0 10px 0;
            font-size: 1rem;
        }
        .preview-card p, .preview-card li {
            color: #b0b0b0;
            line-height: 1.6;
            font-size: 0.9rem;
        }
        .preview-card .note {
            background: rgba(255, 230, 0, 0.1);
            border-left: 4px solid var(--primary-yellow);
            padding: 10px;
            margin-top: 10px;
            border-radius: 0 10px 10px 0;
            font-size: 0.85rem;
        }
        .preview-card .warning {
            background: rgba(255, 0, 110, 0.1);
            border-left: 4px solid var(--primary-pink);
            padding: 10px;
            margin-top: 10px;
            border-radius: 0 10px 10px 0;
            font-size: 0.85rem;
        }
        .validation-error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <nav>
            <a href="index.html" class="logo">FADING ECHO SPEEDRUNS</a>
        </nav>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="speedrun.html">Speedrun</a></li>
            <li><a href="mods.html">Mods</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </div>

    <div class="admin-container">
        <!-- LOGIN -->
        <div class="admin-login" id="loginBox">
            <h2 style="color: var(--primary-cyan); font-family: 'Orbitron', sans-serif;">🔐 GitHub Authentication</h2>
            <p style="color: #aaa; margin: 15px 0;">Enter your GitHub Personal Access Token</p>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">
                Generate one at: <a href="https://github.com/settings/tokens" target="_blank" style="color: var(--primary-yellow);">github.com/settings/tokens</a><br>
                Required scopes: <code>repo</code>
            </p>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
            <br>
            <button class="btn-commit" onclick="authenticate()">Login with GitHub</button>
            <div class="status-msg" id="loginStatus"></div>
        </div>

        <!-- PANEL -->
        <div class="admin-panel" id="adminPanel">
            <div class="user-info" id="userInfo">
                <img id="userAvatar" src="" alt="Avatar">
                <div>
                    <div style="font-weight: 700; color: var(--primary-cyan);" id="userName"></div>
                    <div style="font-size: 0.9rem; color: #aaa;" id="userLogin"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <h2 style="color: var(--primary-cyan); font-family: 'Orbitron', sans-serif; margin-bottom: 20px;">✨ Edit Files</h2>
            
            <div class="file-selector" id="fileSelector">
                <button class="file-btn active" onclick="loadFile('index.html')">index.html</button>
                <button class="file-btn" onclick="loadFile('speedrun.html')">speedrun.html</button>
                <button class="file-btn" onclick="loadFile('voidcancel.html')">voidcancel.html</button>
                <button class="file-btn" onclick="loadFile('mods.html')">mods.html</button>
                <button class="file-btn" onclick="loadFile('admin.html')">admin.html</button>
                <button class="file-btn" onclick="loadFile('404.html')">404.html</button>
                <button class="file-btn" onclick="loadFile('style.css')">style.css</button>
                <button class="file-btn" onclick="loadFile('glitches.json')" style="background: rgba(255, 230, 0, 0.2); border-color: var(--primary-yellow); color: var(--primary-yellow);">glitches.json</button>
            </div>

            <div class="editor-info">
                <span id="editorMode">Mode: HTML</span>
                <span>💡 Press Ctrl+S (or Cmd+S) to save</span>
            </div>

            <textarea id="editor"></textarea>

            <button class="btn-commit" id="commitBtn" onclick="commitChanges()">💾 Commit to GitHub</button>
            <button class="btn-preview" id="previewBtn" onclick="togglePreview()" style="display: none;">👁️ Preview glitches.json</button>
            <div class="status-msg" id="commitStatus"></div>

            <!-- PREVIEW PANEL -->
            <div class="preview-container" id="previewContainer">
                <div class="preview-header">
                    <span>👁️ Live Preview - glitches.json</span>
                    <button onclick="togglePreview()" style="background: rgba(0,0,0,0.3); border: none; color: white; padding: 5px 15px; border-radius: 15px; cursor: pointer;">✕ Close</button>
                </div>
                <div class="preview-content" id="previewContent">
                    <!-- Preview will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

    <script>
        // ===== LISTE DES COMPTES ADMIN =====
        const ADMIN_USERNAMES = [
            "cheapmanga",
        ];
        
        const REPO_NAME = "FadingUtilities";
        const BRANCH = "main";
        const API_BASE = "https://api.github.com";

        let currentToken = localStorage.getItem('github_token');
        let currentFile = 'index.html';
        let originalContent = '';
        let editor; // CodeMirror instance

        // ===== HAMBURGER MENU =====
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            hamburger.setAttribute('aria-expanded', mobileMenu.classList.contains('active') ? 'true' : 'false');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
        });

        function closeMenu() {
            hamburger.classList.remove('active');
            mobileMenu.classList.remove('active');
            hamburger.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }

        mobileMenu.addEventListener('click', (e) => {
            if (e.target === mobileMenu || e.target.tagName === 'A') closeMenu();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mobileMenu.classList.contains('active')) closeMenu();
        });

        // Auto-login si token existe
        if (currentToken) {
            verifyToken();
        }

        // Initialiser CodeMirror
        function initEditor() {
            editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
                lineNumbers: true,
                mode: 'htmlmixed',
                theme: 'dracula',
                indentUnit: 2,
                tabSize: 2,
                indentWithTabs: false,
                lineWrapping: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                matchTags: true,
                showCursorWhenSelecting: true,
                extraKeys: {
                    "Ctrl-S": function() { commitChanges(); },
                    "Cmd-S": function() { commitChanges(); }
                }
            });
            
            editor.on('change', function() {
                // Mettre à jour le bouton de preview si on édite glitches.json
                if (currentFile === 'glitches.json') {
                    const previewBtn = document.getElementById('previewBtn');
                    if (previewBtn) previewBtn.style.display = 'inline-block';
                }
            });
        }

        function getModeFromFilename(filename) {
            if (filename.endsWith('.html')) return 'htmlmixed';
            if (filename.endsWith('.css')) return 'css';
            if (filename.endsWith('.js')) return 'javascript';
            if (filename.endsWith('.json')) return 'application/json';
            return 'htmlmixed';
        }

        function updateEditorMode(filename) {
            const mode = getModeFromFilename(filename);
            editor.setOption('mode', mode);
            
            const modeNames = {
                'htmlmixed': 'HTML',
                'css': 'CSS',
                'javascript': 'JavaScript',
                'application/json': 'JSON'
            };
            
            document.getElementById('editorMode').textContent = `Mode: ${modeNames[mode] || mode}`;
        }

        async function authenticate() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showStatus('loginStatus', 'Please enter a token', 'error');
                return;
            }

            localStorage.setItem('github_token', token);
            currentToken = token;
            await verifyToken();
        }

        async function verifyToken() {
            try {
                const response = await fetch(`${API_BASE}/user`, {
                    headers: {
                        'Authorization': `token ${currentToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) throw new Error('Invalid token');

                const user = await response.json();

                if (!ADMIN_USERNAMES.includes(user.login)) {
                    showStatus('loginStatus', `Account not authorized! Allowed: ${ADMIN_USERNAMES.join(', ')}. Got: ${user.login}`, 'error');
                    localStorage.removeItem('github_token');
                    return;
                }

                document.getElementById('userAvatar').src = user.avatar_url;
                document.getElementById('userName').textContent = user.name || user.login;
                document.getElementById('userLogin').textContent = `@${user.login}`;

                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');

                if (!editor) {
                    initEditor();
                }

                loadFile('index.html');
            } catch (error) {
                showStatus('loginStatus', 'Authentication failed: ' + error.message, 'error');
                localStorage.removeItem('github_token');
            }
        }

        function logout() {
            localStorage.removeItem('github_token');
            location.reload();
        }

        async function loadFile(filename) {
            currentFile = filename;
            
            document.querySelectorAll('.file-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === filename) btn.classList.add('active');
            });

            try {
                const response = await fetch(`${API_BASE}/repos/${ADMIN_USERNAMES[0]}/${REPO_NAME}/contents/${filename}?ref=${BRANCH}`, {
                    headers: {
                        'Authorization': `token ${currentToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) throw new Error('File not found');

                const data = await response.json();
                const content = atob(data.content);
                originalContent = content;
                
                if (editor) {
                    editor.setValue(content);
                    updateEditorMode(filename);
                    
                    // Afficher le bouton preview si c'est glitches.json
                    const previewBtn = document.getElementById('previewBtn');
                    if (filename === 'glitches.json') {
                        previewBtn.style.display = 'inline-block';
                    } else {
                        previewBtn.style.display = 'none';
                        document.getElementById('previewContainer').classList.remove('active');
                    }
                } else {
                    document.getElementById('editor').value = content;
                }
            } catch (error) {
                showStatus('commitStatus', 'Failed to load file: ' + error.message, 'error');
            }
        }

        // ===== PREVIEW FUNCTIONS =====
        function togglePreview() {
            const previewContainer = document.getElementById('previewContainer');
            if (previewContainer.classList.contains('active')) {
                previewContainer.classList.remove('active');
            } else {
                generatePreview();
            }
        }

        function generatePreview() {
            const previewContent = document.getElementById('previewContent');
            const jsonContent = editor.getValue();
            
            try {
                const data = JSON.parse(jsonContent);
                
                if (!data.sections || !Array.isArray(data.sections)) {
                    throw new Error('Invalid JSON structure: missing "sections" array');
                }
                
                let html = '';
                
                data.sections.forEach(section => {
                    const iconClass = section.icon || 'fa-bug';
                    const color = section.color || 'var(--primary-cyan)';
                    
                    html += `<h2><i class="fas ${iconClass}"></i> ${escapeHtml(section.title)}</h2>`;
                    html += `<div class="preview-grid">`;
                    
                    if (section.glitches && Array.isArray(section.glitches)) {
                        section.glitches.forEach(glitch => {
                            html += generateGlitchPreview(glitch);
                        });
                    }
                    
                    html += `</div>`;
                });
                
                previewContent.innerHTML = html;
                document.getElementById('previewContainer').classList.add('active');
                previewContent.scrollTop = 0;
                
            } catch (error) {
                previewContent.innerHTML = `
                    <div class="validation-error">
                        <strong>❌ JSON Validation Error:</strong>\n${error.message}
                    </div>
                `;
                document.getElementById('previewContainer').classList.add('active');
            }
        }

        function generateGlitchPreview(glitch) {
            let html = `<div class="preview-card">`;
            
            // Title
            html += `<h3>${glitch.title_prefix || ''}${escapeHtml(glitch.title)}`;
            if (glitch.alt_names) {
                html += ` <span style="color: var(--primary-pink); font-size: 0.9rem;">| ${escapeHtml(glitch.alt_names)}</span>`;
            }
            html += `</h3>`;
            
            // How to
            if (glitch.how_to) {
                html += `<h4>How to do:</h4><p>${escapeHtml(glitch.how_to)}</p>`;
            }
            
            // Videos
            if (glitch.videos && glitch.videos.length > 0) {
                html += `<h4>Videos:</h4><p style="color: var(--primary-cyan);">📹 ${glitch.videos.join(', ')}</p>`;
            }
            
            // Variations
            if (glitch.variations && glitch.variations.length > 0) {
                html += `<h4>Variations:</h4><ul style="margin-left: 20px;">`;
                glitch.variations.forEach(v => {
                    html += `<li>${escapeHtml(v.text)}`;
                    if (v.video_id) {
                        html += ` <span style="color: var(--primary-cyan);">[📹 Video]</span>`;
                    }
                    html += `</li>`;
                });
                html += `</ul>`;
            }
            
            // Note
            if (glitch.note) {
                const isWarning = glitch.note_type === 'warning' || glitch.note.includes('⚠️');
                const noteClass = isWarning ? 'warning' : 'note';
                const noteLabel = isWarning ? 'Warning:' : 'Note:';
                html += `<div class="${noteClass}"><strong>${noteLabel}</strong> ${escapeHtml(glitch.note)}</div>`;
            }
            
            // Button
            if (glitch.button_text && glitch.button_link) {
                html += `<div style="margin-top: 15px;"><strong>Button:</strong> ${escapeHtml(glitch.button_text)} → ${escapeHtml(glitch.button_link)}</div>`;
            }
            
            // Hover video setting
            if (glitch.hover_video === false) {
                html += `<div style="margin-top: 10px; color: var(--primary-yellow); font-size: 0.85rem;">👁️ Video: Always visible (hover_video: false)</div>`;
            }
            
            html += `</div>`;
            return html;
        }

        async function commitChanges() {
            const content = editor ? editor.getValue() : document.getElementById('editor').value;
            
            if (content === originalContent) {
                showStatus('commitStatus', 'No changes to commit', 'error');
                return;
            }

            // Validation JSON avant commit
            if (currentFile === 'glitches.json') {
                try {
                    JSON.parse(content);
                } catch (error) {
                    showStatus('commitStatus', `❌ Invalid JSON: ${error.message}. Please fix before committing!`, 'error');
                    return;
                }
            }

            const commitBtn = document.getElementById('commitBtn');
            commitBtn.disabled = true;
            commitBtn.textContent = '⏳ Committing...';

            try {
                const fileResponse = await fetch(`${API_BASE}/repos/${ADMIN_USERNAMES[0]}/${REPO_NAME}/contents/${currentFile}?ref=${BRANCH}`, {
                    headers: {
                        'Authorization': `token ${currentToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                const fileData = await fileResponse.json();
                const sha = fileData.sha;

                const commitResponse = await fetch(`${API_BASE}/repos/${ADMIN_USERNAMES[0]}/${REPO_NAME}/contents/${currentFile}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${currentToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update ${currentFile} via admin panel (by ${document.getElementById('userLogin').textContent})`,
                        content: btoa(unescape(encodeURIComponent(content))),
                        sha: sha,
                        branch: BRANCH
                    })
                });

                if (!commitResponse.ok) throw new Error('Commit failed');

                showStatus('commitStatus', '✅ Changes committed successfully! Cloudflare Pages will redeploy automatically.', 'success');
                originalContent = content;
                
                // Fermer la preview après commit réussi
                document.getElementById('previewContainer').classList.remove('active');
            } catch (error) {
                showStatus('commitStatus', '❌ Commit failed: ' + error.message, 'error');
            } finally {
                commitBtn.disabled = false;
                commitBtn.textContent = '💾 Commit to GitHub';
            }
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status-msg ${type}`;
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
