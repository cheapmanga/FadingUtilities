<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FadingUtilities</title>
    <link rel="icon" type="image/png" href="Images/favicon.png">
    <link rel="stylesheet" href="style.css">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 120px auto 50px;
            padding: 30px;
        }
        .admin-login {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--primary-cyan);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .admin-login input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary-cyan);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 1rem;
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
        }
        .admin-panel {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--primary-cyan);
            border-radius: 20px;
            padding: 40px;
        }
        .admin-panel.active { display: block; }
        .file-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .file-btn {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        .file-btn:hover, .file-btn.active {
            background: var(--primary-cyan);
            color: var(--dark-bg);
        }
        
        /* CodeMirror */
        .CodeMirror {
            height: 400px;
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .btn-commit {
            background: linear-gradient(135deg, var(--primary-yellow), var(--primary-pink));
            color: var(--dark-bg);
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn-commit:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-preview {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: var(--dark-bg);
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .status-msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status-msg.success {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
            display: block;
        }
        .status-msg.error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
            display: block;
        }
        .user-info {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--primary-cyan);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary-cyan);
        }
        .logout-btn {
            margin-left: auto;
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid var(--primary-pink);
            color: var(--primary-pink);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
        }
        .editor-info {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* ===== VISUAL EDITOR ===== */
        .visual-editor {
            display: none;
        }
        .visual-editor.active { display: block; }
        
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .view-toggle-btn {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        .view-toggle-btn.active {
            background: var(--primary-cyan);
            color: var(--dark-bg);
        }
        
        .section-block {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary-cyan);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .section-title-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary-cyan);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            flex: 1;
            min-width: 200px;
        }
        .section-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .section-meta select, .section-meta input[type="color"] {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary-cyan);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .section-meta input[type="color"] {
            width: 50px;
            height: 40px;
            cursor: pointer;
        }
        
        .glitch-card-editor {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .glitch-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .glitch-title-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary-yellow);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            flex: 1;
            min-width: 200px;
        }
        .glitch-actions {
            display: flex;
            gap: 8px;
        }
        .btn-small {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn-small:hover {
            background: var(--primary-cyan);
            color: var(--dark-bg);
        }
        .btn-small.danger {
            border-color: var(--primary-pink);
            color: var(--primary-pink);
        }
        .btn-small.danger:hover {
            background: var(--primary-pink);
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            color: var(--primary-cyan);
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 245, 255, 0.3);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-cyan);
        }
        
        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: 0.3s;
            border-radius: 30px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--primary-cyan);
        }
        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }
        .toggle-label {
            color: #aaa;
            font-size: 0.9rem;
        }
        .toggle-label.active {
            color: var(--primary-cyan);
            font-weight: 700;
        }
        
        .variation-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
        }
        .variation-item textarea {
            min-height: 60px;
        }
        .variation-video-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }
        .variation-video-input input {
            flex: 1;
        }
        
        .video-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .video-tag {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .video-tag .remove-video {
            cursor: pointer;
            color: var(--primary-pink);
            font-weight: 700;
        }
        .add-video-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .add-video-container input {
            flex: 1;
        }
        
        .btn-add-section {
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-pink));
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .btn-add-card {
            background: rgba(255, 230, 0, 0.2);
            border: 2px solid var(--primary-yellow);
            color: var(--primary-yellow);
            padding: 12px 25px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-add-card:hover {
            background: var(--primary-yellow);
            color: var(--dark-bg);
        }
        
        .note-type-select {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .note-type-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 245, 255, 0.3);
            color: #aaa;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .note-type-btn.active {
            border-color: var(--primary-cyan);
            color: var(--primary-cyan);
            background: rgba(0, 245, 255, 0.1);
        }
        .note-type-btn.warning.active {
            border-color: var(--primary-pink);
            color: var(--primary-pink);
            background: rgba(255, 0, 110, 0.1);
        }
        
        .icon-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .icon-option {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 245, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .icon-option.active {
            border-color: var(--primary-cyan);
            background: rgba(0, 245, 255, 0.1);
        }
        .icon-option i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <nav>
            <a href="index.html" class="logo">FADING ECHO SPEEDRUNS</a>
        </nav>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="speedrun.html">Speedrun</a></li>
            <li><a href="mods.html">Mods</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </div>

    <div class="admin-container">
        <!-- LOGIN -->
        <div class="admin-login" id="loginBox">
            <h2 style="color: var(--primary-cyan); font-family: 'Orbitron', sans-serif;">🔐 GitHub Authentication</h2>
            <p style="color: #aaa; margin: 15px 0;">Enter your GitHub Personal Access Token</p>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">
                Generate one at: <a href="https://github.com/settings/tokens" target="_blank" style="color: var(--primary-yellow);">github.com/settings/tokens</a><br>
                Required scopes: <code>repo</code>
            </p>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
            <br>
            <button class="btn-commit" onclick="authenticate()">Login with GitHub</button>
            <div class="status-msg" id="loginStatus"></div>
        </div>

        <!-- PANEL -->
        <div class="admin-panel" id="adminPanel">
            <div class="user-info" id="userInfo">
                <img id="userAvatar" src="" alt="Avatar">
                <div>
                    <div style="font-weight: 700; color: var(--primary-cyan);" id="userName"></div>
                    <div style="font-size: 0.9rem; color: #aaa;" id="userLogin"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <h2 style="color: var(--primary-cyan); font-family: 'Orbitron', sans-serif; margin-bottom: 20px;">✨ Admin Panel</h2>
            
            <div class="file-selector" id="fileSelector">
                <button class="file-btn active" onclick="loadFile('index.html')">index.html</button>
                <button class="file-btn" onclick="loadFile('speedrun.html')">speedrun.html</button>
                <button class="file-btn" onclick="loadFile('voidcancel.html')">voidcancel.html</button>
                <button class="file-btn" onclick="loadFile('mods.html')">mods.html</button>
                <button class="file-btn" onclick="loadFile('admin.html')">admin.html</button>
                <button class="file-btn" onclick="loadFile('404.html')">404.html</button>
                <button class="file-btn" onclick="loadFile('style.css')">style.css</button>
                <button class="file-btn" onclick="loadFile('glitches.json')" style="background: rgba(255, 230, 0, 0.2); border-color: var(--primary-yellow); color: var(--primary-yellow);">glitches.json</button>
            </div>

            <!-- View Toggle (only for glitches.json) -->
            <div class="view-toggle" id="viewToggle" style="display: none;">
                <button class="view-toggle-btn active" onclick="switchView('visual')">🎨 Visual Editor</button>
                <button class="view-toggle-btn" onclick="switchView('code')">💻 Code Editor</button>
            </div>

            <div class="editor-info">
                <span id="editorMode">Mode: HTML</span>
                <span>💡 Press Ctrl+S (or Cmd+S) to save</span>
            </div>

            <!-- Code Editor (CodeMirror) -->
            <div id="codeEditorContainer">
                <textarea id="editor"></textarea>
            </div>

            <!-- Visual Editor -->
            <div class="visual-editor" id="visualEditor">
                <div id="visualEditorContent">
                    <!-- Sections will be rendered here -->
                </div>
                
                <button class="btn-add-section" onclick="addNewSection()">
                    ➕ Add New Section
                </button>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn-commit" id="commitBtn" onclick="commitChanges()">💾 Commit to GitHub</button>
                <button class="btn-preview" id="previewBtn" onclick="togglePreview()" style="display: none;">👁️ Preview</button>
            </div>
            <div class="status-msg" id="commitStatus"></div>

            <!-- Preview Panel -->
            <div class="preview-container" id="previewContainer" style="display: none; margin-top: 30px; border: 2px solid var(--primary-cyan); border-radius: 20px; overflow: hidden;">
                <div style="background: linear-gradient(135deg, var(--primary-cyan), var(--primary-pink)); color: var(--dark-bg); padding: 15px 20px; font-family: 'Orbitron', sans-serif; font-weight: 700; display: flex; justify-content: space-between; align-items: center;">
                    <span>️ Live Preview</span>
                    <button onclick="togglePreview()" style="background: rgba(0,0,0,0.3); border: none; color: white; padding: 5px 15px; border-radius: 15px; cursor: pointer;">✕ Close</button>
                </div>
                <div id="previewContent" style="background: var(--dark-bg); padding: 30px; max-height: 800px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        // ===== CONFIG =====
        const ADMIN_USERNAMES = ["cheapmanga"];
        const REPO_NAME = "FadingUtilities";
        const BRANCH = "main";
        const API_BASE = "https://api.github.com";

        let currentToken = localStorage.getItem('github_token');
        let currentFile = 'index.html';
        let originalContent = '';
        let editor;
        let glitchesData = null; // Parsed JSON data for visual editor

        const AVAILABLE_ICONS = [
            { id: 'fa-running', label: '🏃 Running' },
            { id: 'fa-trophy', label: ' Trophy' },
            { id: 'fa-puzzle-piece', label: '🧩 Puzzle' },
            { id: 'fa-rocket', label: '🚀 Rocket' },
            { id: 'fa-bug', label: ' Bug' },
            { id: 'fa-bolt', label: '⚡ Bolt' },
            { id: 'fa-star', label: '⭐ Star' },
            { id: 'fa-users', label: '👥 Users' },
            { id: 'fa-film', label: '🎬 Film' },
            { id: 'fa-ban', label: '🚫 Ban' },
            { id: 'fa-infinity', label: '♾️ Infinity' },
            { id: 'fa-door-open', label: ' Door' },
            { id: 'fa-radiation', label: '☢️ Radiation' },
            { id: 'fa-gamepad', label: '🎮 Gamepad' },
            { id: 'fa-stopwatch', label: '⏱️ Stopwatch' },
            { id: 'fa-microchip', label: ' Chip' },
            { id: 'fa-heart', label: '❤️ Heart' },
            { id: 'fa-cube', label: ' Cube' },
            { id: 'fa-shield-alt', label: '🛡️ Shield' }
        ];

        // ===== HAMBURGER MENU =====
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });
        }
        if (mobileMenu) {
            mobileMenu.addEventListener('click', (e) => {
                if (e.target === mobileMenu || e.target.tagName === 'A') {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                }
            });
        }

        // Auto-login
        if (currentToken) verifyToken();

        function initEditor() {
            editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
                lineNumbers: true,
                mode: 'htmlmixed',
                theme: 'dracula',
                indentUnit: 2,
                tabSize: 2,
                lineWrapping: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                matchTags: true,
                extraKeys: {
                    "Ctrl-S": function() { commitChanges(); },
                    "Cmd-S": function() { commitChanges(); }
                }
            });
        }

        function getModeFromFilename(filename) {
            if (filename.endsWith('.html')) return 'htmlmixed';
            if (filename.endsWith('.css')) return 'css';
            if (filename.endsWith('.js')) return 'javascript';
            if (filename.endsWith('.json')) return 'application/json';
            return 'htmlmixed';
        }

        function updateEditorMode(filename) {
            const mode = getModeFromFilename(filename);
            if (editor) editor.setOption('mode', mode);
            const modeNames = { 'htmlmixed': 'HTML', 'css': 'CSS', 'javascript': 'JavaScript', 'application/json': 'JSON' };
            document.getElementById('editorMode').textContent = `Mode: ${modeNames[mode] || mode}`;
        }

        async function authenticate() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showStatus('loginStatus', 'Please enter a token', 'error'); return; }
            localStorage.setItem('github_token', token);
            currentToken = token;
            await verifyToken();
        }

        async function verifyToken() {
            try {
                const response = await fetch(`${API_BASE}/user`, {
                    headers: { 'Authorization': `token ${currentToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!response.ok) throw new Error('Invalid token');
                const user = await response.json();
                if (!ADMIN_USERNAMES.includes(user.login)) {
                    showStatus('loginStatus', `Account not authorized!`, 'error');
                    localStorage.removeItem('github_token');
                    return;
                }
                document.getElementById('userAvatar').src = user.avatar_url;
                document.getElementById('userName').textContent = user.name || user.login;
                document.getElementById('userLogin').textContent = `@${user.login}`;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                if (!editor) initEditor();
                loadFile('index.html');
            } catch (error) {
                showStatus('loginStatus', 'Authentication failed: ' + error.message, 'error');
                localStorage.removeItem('github_token');
            }
        }

        function logout() {
            localStorage.removeItem('github_token');
            location.reload();
        }

        async function loadFile(filename) {
            currentFile = filename;
            document.querySelectorAll('.file-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === filename) btn.classList.add('active');
            });

            try {
                const response = await fetch(`${API_BASE}/repos/${ADMIN_USERNAMES[0]}/${REPO_NAME}/contents/${filename}?ref=${BRANCH}`, {
                    headers: { 'Authorization': `token ${currentToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                const content = atob(data.content);
                originalContent = content;
                
                if (editor) {
                    editor.setValue(content);
                    updateEditorMode(filename);
                }

                // Show/hide visual editor toggle
                const viewToggle = document.getElementById('viewToggle');
                const visualEditor = document.getElementById('visualEditor');
                const codeEditorContainer = document.getElementById('codeEditorContainer');
                
                if (filename === 'glitches.json') {
                    viewToggle.style.display = 'flex';
                    try {
                        glitchesData = JSON.parse(content);
                        renderVisualEditor();
                        switchView('visual');
                    } catch (e) {
                        showStatus('commitStatus', 'Invalid JSON, showing code editor', 'error');
                        switchView('code');
                    }
                } else {
                    viewToggle.style.display = 'none';
                    visualEditor.classList.remove('active');
                    codeEditorContainer.style.display = 'block';
                }

                document.getElementById('previewBtn').style.display = 'none';
                document.getElementById('previewContainer').style.display = 'none';
            } catch (error) {
                showStatus('commitStatus', 'Failed to load file: ' + error.message, 'error');
            }
        }

        function switchView(view) {
            const visualEditor = document.getElementById('visualEditor');
            const codeEditorContainer = document.getElementById('codeEditorContainer');
            const previewBtn = document.getElementById('previewBtn');
            const viewToggleBtns = document.querySelectorAll('.view-toggle-btn');
            
            viewToggleBtns.forEach(btn => btn.classList.remove('active'));
            
            if (view === 'visual') {
                // Sync from code to visual
                try {
                    glitchesData = JSON.parse(editor.getValue());
                    renderVisualEditor();
                    visualEditor.classList.add('active');
                    codeEditorContainer.style.display = 'none';
                    previewBtn.style.display = 'inline-block';
                    viewToggleBtns[0].classList.add('active');
                } catch (e) {
                    showStatus('commitStatus', 'Invalid JSON: ' + e.message, 'error');
                    return;
                }
            } else {
                // Sync from visual to code
                syncVisualToCode();
                visualEditor.classList.remove('active');
                codeEditorContainer.style.display = 'block';
                previewBtn.style.display = 'inline-block';
                viewToggleBtns[1].classList.add('active');
            }
        }

        function syncVisualToCode() {
            if (glitchesData) {
                editor.setValue(JSON.stringify(glitchesData, null, 2));
            }
        }

        // ===== VISUAL EDITOR =====
        function renderVisualEditor() {
            const container = document.getElementById('visualEditorContent');
            container.innerHTML = '';
            
            if (!glitchesData || !glitchesData.sections) {
                container.innerHTML = '<p style="color: var(--primary-pink); text-align: center; padding: 40px;">No sections found. Click "Add New Section" to start.</p>';
                return;
            }
            
            glitchesData.sections.forEach((section, sectionIndex) => {
                container.innerHTML += renderSection(section, sectionIndex);
            });
        }

        function renderSection(section, sectionIndex) {
            let html = `<div class="section-block" data-section-index="${sectionIndex}">`;
            
            // Section Header
            html += `<div class="section-header">`;
            html += `<input type="text" class="section-title-input" value="${escapeAttr(section.title)}" onchange="updateSection(${sectionIndex}, 'title', this.value)" placeholder="Section Title">`;
            html += `<div class="section-meta">`;
            
            // Icon selector
            html += `<select onchange="updateSection(${sectionIndex}, 'icon', this.value)">`;
            AVAILABLE_ICONS.forEach(icon => {
                html += `<option value="${icon.id}" ${section.icon === icon.id ? 'selected' : ''}>${icon.label}</option>`;
            });
            html += `</select>`;
            
            // Color picker
            html += `<input type="color" value="${section.color && section.color.startsWith('#') ? section.color : '#00F5FF'}" onchange="updateSection(${sectionIndex}, 'color', this.value)" title="Section Color">`;
            
            // Delete section button
            html += `<button class="btn-small danger" onclick="deleteSection(${sectionIndex})">🗑️ Delete Section</button>`;
            html += `</div></div>`;
            
            // Glitches in this section
            if (section.glitches && section.glitches.length > 0) {
                section.glitches.forEach((glitch, glitchIndex) => {
                    html += renderGlitchCard(glitch, sectionIndex, glitchIndex);
                });
            }
            
            // Add card button
            html += `<button class="btn-add-card" onclick="addNewCard(${sectionIndex})">➕ Add New Card to "${escapeHtml(section.title)}"</button>`;
            
            html += `</div>`;
            return html;
        }

        function renderGlitchCard(glitch, sectionIndex, glitchIndex) {
            let html = `<div class="glitch-card-editor" data-section="${sectionIndex}" data-glitch="${glitchIndex}">`;
            
            // Card Header
            html += `<div class="glitch-card-header">`;
            html += `<input type="text" class="glitch-title-input" value="${escapeAttr(glitch.title)}" onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'title', this.value)" placeholder="Glitch Title">`;
            html += `<div class="glitch-actions">`;
            html += `<button class="btn-small" onclick="moveCardUp(${sectionIndex}, ${glitchIndex})">️</button>`;
            html += `<button class="btn-small" onclick="moveCardDown(${sectionIndex}, ${glitchIndex})">⬇️</button>`;
            html += `<button class="btn-small danger" onclick="deleteCard(${sectionIndex}, ${glitchIndex})">🗑️</button>`;
            html += `</div></div>`;
            
            // Alt names
            html += `<div class="form-group">`;
            html += `<label>Alternative Names</label>`;
            html += `<input type="text" value="${escapeAttr(glitch.alt_names || '')}" onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'alt_names', this.value)" placeholder="e.g., Wave Dash, Long Jump">`;
            html += `</div>`;
            
            // How to
            html += `<div class="form-group">`;
            html += `<label>How to do</label>`;
            html += `<textarea onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'how_to', this.value)" placeholder="Explain how to perform the glitch...">${escapeHtml(glitch.how_to || '')}</textarea>`;
            html += `</div>`;
            
            // Videos
            html += `<div class="form-group">`;
            html += `<label>YouTube Video IDs (main videos)</label>`;
            html += `<div class="video-list">`;
            if (glitch.videos && glitch.videos.length > 0) {
                glitch.videos.forEach((videoId, vIndex) => {
                    html += `<div class="video-tag">${escapeHtml(videoId)} <span class="remove-video" onclick="removeVideo(${sectionIndex}, ${glitchIndex}, ${vIndex})">✕</span></div>`;
                });
            }
            html += `</div>`;
            html += `<div class="add-video-container">`;
            html += `<input type="text" id="video-input-${sectionIndex}-${glitchIndex}" placeholder="Paste YouTube video ID (e.g., CMLUlUVKSEc)">`;
            html += `<button class="btn-small" onclick="addVideo(${sectionIndex}, ${glitchIndex})">Add Video</button>`;
            html += `</div></div>`;
            
            // Hover video toggle
            html += `<div class="form-group">`;
            html += `<label>Video Display Mode</label>`;
            html += `<div class="toggle-container">`;
            html += `<label class="toggle-switch">`;
            html += `<input type="checkbox" ${glitch.hover_video !== false ? 'checked' : ''} onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'hover_video', this.checked)">`;
            html += `<span class="toggle-slider"></span>`;
            html += `</label>`;
            html += `<span class="toggle-label ${glitch.hover_video !== false ? 'active' : ''}">SHOWN on hover (default)</span>`;
            html += `<span class="toggle-label ${glitch.hover_video === false ? 'active' : ''}">ALWAYS visible</span>`;
            html += `</div></div>`;
            
            // Variations
            html += `<div class="form-group">`;
            html += `<label>Variations</label>`;
            if (glitch.variations && glitch.variations.length > 0) {
                glitch.variations.forEach((variation, vIndex) => {
                    html += `<div class="variation-item">`;
                    html += `<textarea onchange="updateVariation(${sectionIndex}, ${glitchIndex}, ${vIndex}, 'text', this.value)" placeholder="Variation description...">${escapeHtml(variation.text || '')}</textarea>`;
                    html += `<div class="variation-video-input">`;
                    html += `<input type="text" value="${escapeAttr(variation.video_id || '')}" onchange="updateVariation(${sectionIndex}, ${glitchIndex}, ${vIndex}, 'video_id', this.value)" placeholder="YouTube video ID (optional)">`;
                    html += `<button class="btn-small danger" onclick="deleteVariation(${sectionIndex}, ${glitchIndex}, ${vIndex})">🗑️</button>`;
                    html += `</div></div>`;
                });
            }
            html += `<button class="btn-small" onclick="addVariation(${sectionIndex}, ${glitchIndex})" style="margin-top: 10px;">➕ Add Variation</button>`;
            html += `</div>`;
            
            // Note
            html += `<div class="form-group">`;
            html += `<label>Note</label>`;
            html += `<textarea onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'note', this.value)" placeholder="Important note...">${escapeHtml(glitch.note || '')}</textarea>`;
            html += `<div class="note-type-select">`;
            html += `<button class="note-type-btn ${glitch.note_type !== 'warning' ? 'active' : ''}" onclick="updateGlitch(${sectionIndex}, ${glitchIndex}, 'note_type', 'note')">📝 Note</button>`;
            html += `<button class="note-type-btn warning ${glitch.note_type === 'warning' ? 'active' : ''}" onclick="updateGlitch(${sectionIndex}, ${glitchIndex}, 'note_type', 'warning')">⚠️ Warning</button>`;
            html += `</div></div>`;
            
            // Discord link
            html += `<div class="form-group">`;
            html += `<label>Discord Link</label>`;
            html += `<input type="text" value="${escapeAttr(glitch.discord_link || '')}" onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'discord_link', this.value)" placeholder="https://discord.com/...">`;
            html += `</div>`;
            
            // Button (for Void Cancel guide etc.)
            html += `<div class="form-group">`;
            html += `<label>Custom Button (optional)</label>`;
            html += `<input type="text" value="${escapeAttr(glitch.button_text || '')}" onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'button_text', this.value)" placeholder="Button text (e.g., Read the Complete Guide)" style="margin-bottom: 10px;">`;
            html += `<input type="text" value="${escapeAttr(glitch.button_link || '')}" onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'button_link', this.value)" placeholder="Button link (e.g., voidcancel.html)">`;
            html += `</div>`;
            
            // Extra content (HTML)
            html += `<div class="form-group">`;
            html += `<label>Extra HTML Content (optional, advanced)</label>`;
            html += `<textarea onchange="updateGlitch(${sectionIndex}, ${glitchIndex}, 'extra_content', this.value)" placeholder="<h4>To summarize:</h4><p>Enter > Down > Enter...">${escapeHtml(glitch.extra_content || '')}</textarea>`;
            html += `</div>`;
            
            html += `</div>`;
            return html;
        }

        // ===== UPDATE FUNCTIONS =====
        function updateSection(sectionIndex, key, value) {
            glitchesData.sections[sectionIndex][key] = value;
        }

        function updateGlitch(sectionIndex, glitchIndex, key, value) {
            if (key === 'hover_video') {
                glitchesData.sections[sectionIndex].glitches[glitchIndex][key] = value;
            } else if (key === 'note_type') {
                glitchesData.sections[sectionIndex].glitches[glitchIndex][key] = value === 'note' ? undefined : 'warning';
            } else {
                glitchesData.sections[sectionIndex].glitches[glitchIndex][key] = value;
            }
        }

        function updateVariation(sectionIndex, glitchIndex, variationIndex, key, value) {
            glitchesData.sections[sectionIndex].glitches[glitchIndex].variations[variationIndex][key] = value;
        }

        function addNewSection() {
            if (!glitchesData) glitchesData = { sections: [] };
            glitchesData.sections.push({
                id: 'new_section_' + Date.now(),
                title: 'New Section',
                icon: 'fa-star',
                color: '#00F5FF',
                glitches: []
            });
            renderVisualEditor();
        }

        function deleteSection(sectionIndex) {
            if (confirm('Delete this entire section and all its cards?')) {
                glitchesData.sections.splice(sectionIndex, 1);
                renderVisualEditor();
            }
        }

        function addNewCard(sectionIndex) {
            glitchesData.sections[sectionIndex].glitches.push({
                title: 'New Glitch',
                alt_names: '',
                how_to: '',
                variations: [],
                note: '',
                discord_link: '',
                videos: []
            });
            renderVisualEditor();
        }

        function deleteCard(sectionIndex, glitchIndex) {
            if (confirm('Delete this card?')) {
                glitchesData.sections[sectionIndex].glitches.splice(glitchIndex, 1);
                renderVisualEditor();
            }
        }

        function moveCardUp(sectionIndex, glitchIndex) {
            if (glitchIndex > 0) {
                const glitches = glitchesData.sections[sectionIndex].glitches;
                [glitches[glitchIndex - 1], glitches[glitchIndex]] = [glitches[glitchIndex], glitches[glitchIndex - 1]];
                renderVisualEditor();
            }
        }

        function moveCardDown(sectionIndex, glitchIndex) {
            const glitches = glitchesData.sections[sectionIndex].glitches;
            if (glitchIndex < glitches.length - 1) {
                [glitches[glitchIndex], glitches[glitchIndex + 1]] = [glitches[glitchIndex + 1], glitches[glitchIndex]];
                renderVisualEditor();
            }
        }

        function addVideo(sectionIndex, glitchIndex) {
            const input = document.getElementById(`video-input-${sectionIndex}-${glitchIndex}`);
            const videoId = input.value.trim();
            if (videoId) {
                if (!glitchesData.sections[sectionIndex].glitches[glitchIndex].videos) {
                    glitchesData.sections[sectionIndex].glitches[glitchIndex].videos = [];
                }
                glitchesData.sections[sectionIndex].glitches[glitchIndex].videos.push(videoId);
                renderVisualEditor();
            }
        }

        function removeVideo(sectionIndex, glitchIndex, videoIndex) {
            glitchesData.sections[sectionIndex].glitches[glitchIndex].videos.splice(videoIndex, 1);
            renderVisualEditor();
        }

        function addVariation(sectionIndex, glitchIndex) {
            if (!glitchesData.sections[sectionIndex].glitches[glitchIndex].variations) {
                glitchesData.sections[sectionIndex].glitches[glitchIndex].variations = [];
            }
            glitchesData.sections[sectionIndex].glitches[glitchIndex].variations.push({ text: '', video_id: '' });
            renderVisualEditor();
        }

        function deleteVariation(sectionIndex, glitchIndex, variationIndex) {
            glitchesData.sections[sectionIndex].glitches[glitchIndex].variations.splice(variationIndex, 1);
            renderVisualEditor();
        }

        // ===== PREVIEW =====
        function togglePreview() {
            const previewContainer = document.getElementById('previewContainer');
            if (previewContainer.style.display === 'none' || !previewContainer.style.display) {
                generatePreview();
                previewContainer.style.display = 'block';
            } else {
                previewContainer.style.display = 'none';
            }
        }

        function generatePreview() {
            const previewContent = document.getElementById('previewContent');
            let data = glitchesData;
            
            if (!data) {
                try {
                    data = JSON.parse(editor.getValue());
                } catch (e) {
                    previewContent.innerHTML = `<div style="color: #ff0000; padding: 20px;">❌ Invalid JSON: ${e.message}</div>`;
                    document.getElementById('previewContainer').style.display = 'block';
                    return;
                }
            }
            
            if (!data.sections || !Array.isArray(data.sections)) {
                previewContent.innerHTML = `<div style="color: #ff0000; padding: 20px;">❌ Invalid structure: missing "sections" array</div>`;
                document.getElementById('previewContainer').style.display = 'block';
                return;
            }
            
            let html = '';
            data.sections.forEach(section => {
                const color = section.color || 'var(--primary-cyan)';
                html += `<h2 style="color: ${color}; border-bottom: 2px solid ${color}; padding-bottom: 10px; margin: 30px 0 20px 0;"><i class="fas ${section.icon || 'fa-bug'}"></i> ${escapeHtml(section.title)}</h2>`;
                html += `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">`;
                
                if (section.glitches) {
                    section.glitches.forEach(glitch => {
                        html += `<div style="background: rgba(255,255,255,0.03); border: 2px solid rgba(0,245,255,0.3); border-radius: 15px; padding: 20px;">`;
                        html += `<h3 style="color: var(--primary-yellow); margin-bottom: 10px;">${glitch.title_prefix || ''}${escapeHtml(glitch.title)}`;
                        if (glitch.alt_names) html += ` <span style="color: var(--primary-pink); font-size: 0.9rem;">| ${escapeHtml(glitch.alt_names)}</span>`;
                        html += `</h3>`;
                        
                        if (glitch.how_to) html += `<h4 style="color: var(--primary-cyan); margin: 15px 0 5px 0;">How to do:</h4><p style="color: #b0b0b0;">${escapeHtml(glitch.how_to)}</p>`;
                        
                        if (glitch.videos && glitch.videos.length > 0) {
                            html += `<p style="color: var(--primary-cyan); margin-top: 10px;"> Videos: ${glitch.videos.join(', ')}</p>`;
                            if (glitch.hover_video === false) {
                                html += `<p style="color: var(--primary-yellow); font-size: 0.85rem;">👁️ Always visible</p>`;
                            } else {
                                html += `<p style="color: #888; font-size: 0.85rem;">️ Shown on hover</p>`;
                            }
                        }
                        
                        if (glitch.variations && glitch.variations.length > 0) {
                            html += `<h4 style="color: var(--primary-cyan); margin: 15px 0 5px 0;">Variations:</h4><ul style="margin-left: 20px; color: #b0b0b0;">`;
                            glitch.variations.forEach(v => {
                                html += `<li>${escapeHtml(v.text)}${v.video_id ? ' <span style="color: var(--primary-cyan);">[]</span>' : ''}</li>`;
                            });
                            html += `</ul>`;
                        }
                        
                        if (glitch.note) {
                            const isWarning = glitch.note_type === 'warning' || glitch.note.includes('⚠️');
                            const bgColor = isWarning ? 'rgba(255,0,110,0.1)' : 'rgba(255,230,0,0.1)';
                            const borderColor = isWarning ? 'var(--primary-pink)' : 'var(--primary-yellow)';
                            const label = isWarning ? 'Warning:' : 'Note:';
                            html += `<div style="background: ${bgColor}; border-left: 4px solid ${borderColor}; padding: 10px; margin-top: 10px; border-radius: 0 10px 10px 0; font-size: 0.9rem;"><strong>${label}</strong> ${escapeHtml(glitch.note)}</div>`;
                        }
                        
                        if (glitch.button_text) {
                            html += `<div style="margin-top: 15px; padding: 10px; background: rgba(0,245,255,0.1); border-radius: 10px; text-align: center;"><strong>Button:</strong> ${escapeHtml(glitch.button_text)} → ${escapeHtml(glitch.button_link)}</div>`;
                        }
                        
                        html += `</div>`;
                    });
                }
                
                html += `</div>`;
            });
            
            previewContent.innerHTML = html;
        }

        // ===== COMMIT =====
        async function commitChanges() {
            // Sync visual to code if needed
            if (currentFile === 'glitches.json' && glitchesData) {
                syncVisualToCode();
            }
            
            const content = editor ? editor.getValue() : document.getElementById('editor').value;
            
            if (content === originalContent) {
                showStatus('commitStatus', 'No changes to commit', 'error');
                return;
            }

            if (currentFile === 'glitches.json') {
                try {
                    JSON.parse(content);
                } catch (error) {
                    showStatus('commitStatus', `❌ Invalid JSON: ${error.message}`, 'error');
                    return;
                }
            }

            const commitBtn = document.getElementById('commitBtn');
            commitBtn.disabled = true;
            commitBtn.textContent = '⏳ Committing...';

            try {
                const fileResponse = await fetch(`${API_BASE}/repos/${ADMIN_USERNAMES[0]}/${REPO_NAME}/contents/${currentFile}?ref=${BRANCH}`, {
                    headers: { 'Authorization': `token ${currentToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const fileData = await fileResponse.json();
                const sha = fileData.sha;

                const commitResponse = await fetch(`${API_BASE}/repos/${ADMIN_USERNAMES[0]}/${REPO_NAME}/contents/${currentFile}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${currentToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update ${currentFile} via admin panel (by ${document.getElementById('userLogin').textContent})`,
                        content: btoa(unescape(encodeURIComponent(content))),
                        sha: sha,
                        branch: BRANCH
                    })
                });

                if (!commitResponse.ok) throw new Error('Commit failed');

                showStatus('commitStatus', '✅ Changes committed successfully!', 'success');
                originalContent = content;
            } catch (error) {
                showStatus('commitStatus', '❌ Commit failed: ' + error.message, 'error');
            } finally {
                commitBtn.disabled = false;
                commitBtn.textContent = '💾 Commit to GitHub';
            }
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status-msg ${type}`;
            setTimeout(() => { element.style.display = 'none'; }, 5000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            if (!text) return '';
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
    </script>
