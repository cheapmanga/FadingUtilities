<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | FadingUtilities</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="Images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-animation"></div>
<header>
<nav>
<a href="index.html" class="logo">FADING ECHO SPEEDRUNS</a>
</nav>
</header>

<div class="error-container">
<div class="error-code">404</div>
<h1 class="error-message">This page has fallen into the void...</h1>
<p style="color: #a0a0a0; font-size: 1.2rem; margin-bottom: 40px;">
The page you're looking for doesn't exist or has been moved.
</p>
<a href="index.html" class="contribute-button">
<i class="fas fa-home"></i> Back to Home
</a>
</div>

<script>
function createWaterParticle() {
const particle = document.createElement('div');
particle.className = 'water-particle';
particle.style.left = Math.random() * 100 + 'vw';
particle.style.width = Math.random() * 10 + 5 + 'px';
particle.style.height = particle.style.width;
particle.style.animationDuration = Math.random() * 3 + 2 + 's';
document.body.appendChild(particle);
setTimeout(() => { particle.remove(); }, 5000);
}
setInterval(createWaterParticle, 500);
</script>
</body>
</html>
